services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: backend
    restart: unless-stopped
    ports:
      - '${BACKEND_PORT:-8000}:8000'
    env_file:
      - ./.env
    depends_on:
      postgres:
        condition: service_started
      minio:
        condition: service_started
    networks:
      - app-network

  postgres:
    build:
      context: ./backend
      dockerfile: Dockerfile.postgres
    image: atomskills-postgres:16
    container_name: postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-atomskills}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - '${POSTGRES_PORT:-5433}:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-atomskills}',
        ]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - app-network

  minio:
    image: minio/minio:RELEASE.2021-04-22T15-44-28Z
    container_name: minio
    restart: unless-stopped
    command: server /data
    ports:
      - '${MINIO_PORT:-9000}:9000'
      - '${MINIO_CONSOLE_PORT:-9001}:${MINIO_CONSOLE_PORT:-9001}'
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    volumes:
      - minio_data:/data
    networks:
      - app-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: frontend
    restart: unless-stopped
    ports:
      - '${FRONTEND_PORT:-80}:80'
    depends_on:
      backend:
        condition: service_started
      onlyoffice:
        condition: service_healthy
    networks:
      - app-network

  onlyoffice:
    image: onlyoffice/documentserver:latest
    container_name: onlyoffice
    restart: unless-stopped
    ports:
      - '${ONLYOFFICE_PORT:-8082}:80'
    networks:
      - app-network
    environment:
      JWT_ENABLED: "false"
      ALLOW_PRIVATE_IP_ADDRESS: "true"
      ALLOW_META_IP_ADDRESS: "true"
    volumes:
      - onlyoffice_data:/var/www/onlyoffice/Data
    healthcheck:
      test: ['CMD-SHELL', 'curl -fsS http://localhost/healthcheck || exit 1']
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 40s

networks:
  app-network:
    driver: bridge

volumes:
  postgres_data:
  minio_data:
  onlyoffice_data:
